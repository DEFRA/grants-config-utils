name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'commit message'
        required: false
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write  # Required for OIDC
  checks: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org/"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: SonarCloud Scan
        if: github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'Create new config version')
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e #8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Set user
        run: git config user.name github-actions[bot] && git config user.email github-actions[bot]@users.noreply.github.com

      - name: Create Release Pull Request or Release
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d #v1.9.0
        with:
          commitMode: 'github-api'
          publish: npm run github:release
          commit: 'Create new config version'
          title: 'Create new config version'

      - name: Trigger required checks on release PR, then merge to main, and delete release branch
        if: ${{ !startsWith(github.event_name == 'push' && github.event.head_commit.message || inputs.commit_message, 'Create new config version') }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 #v9.0.0
        with:
          script: |
            const prNumber = Number("${{ steps.changesets.outputs.pullRequestNumber }}");
            const { data: releasePR } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (!releasePR) return;

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Run Pull Request Checks',
              head_sha: releasePR.head.sha,
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'Required check triggered',
                summary: `Check created for PR #${releasePR.number}`
              }
            })

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: releasePR.number,
              merge_method: "squash"
            });

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: 'main',
              headers: {
                'X-GitHub-Api-Version': '2022-11-28'
              },
              inputs: {
                commit_message: 'Create new config version'
              }
            });

            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${releasePR.head.ref}`
            });
